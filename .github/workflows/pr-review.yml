name: AI PR Review

on:
  pull_request:
    branches:
      - dev
      - main
    types: [opened, synchronize, reopened]

concurrency:
  group: ai-pr-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-pr-review:
    name: AI PR Review
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install mistralai requests

      - name: Generate diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          git diff origin/${{ github.base_ref }}...HEAD \
            -- '*.py' '*.ts' '*.tsx' '*.js' '*.jsx' \
            > diff.txt

          LINES=$(wc -l < diff.txt)
          echo "lines=$LINES" >> "$GITHUB_OUTPUT"
          echo "Diff: $LINES lines"

          if [ "$LINES" -gt 3000 ]; then
            head -n 3000 diff.txt > diff_truncated.txt
            mv diff_truncated.txt diff.txt
            echo "truncated=true" >> "$GITHUB_OUTPUT"
          else
            echo "truncated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Collect commit messages
        run: |
          git log origin/${{ github.base_ref }}..HEAD \
            --pretty=format:"%s" > commits.txt

      - name: Download review script
        # The review.py lives in .github/scripts/ in your repo
        # If you place it there, replace this step with nothing — it's already checked out.
        run: |
          if [ ! -f .github/scripts/review.py ]; then
            echo "ERROR: .github/scripts/review.py not found." >&2
            echo "Place review.py in .github/scripts/ in your repository."
            exit 1
          fi

      - name: Run AI pr-review
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          DIFF_TRUNCATED: ${{ steps.diff.outputs.truncated }}
        run: python .github/scripts/review.py
