services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant_local:/qdrant/storage

  backend:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - GRAPH_JSON_PATH=data/output/graph/graph.json
    depends_on:
      - qdrant
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/* && pip install --no-cache-dir -r requirements.txt && pip install --no-cache-dir qdrant-client==1.9.1 && uvicorn backend.app:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"